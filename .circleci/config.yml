version: 2.1

executors:
  uv-python:
    docker:
      - image: cimg/python:3.11

commands:
  setup-uv:
    description: Install uv and add it to PATH
    steps:
      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"

  sync-env:
    description: Restore the uv cache, sync the environment, then save the cache
    parameters:
      extra:
        type: string
        default: ""
    steps:
      - restore_cache:
          keys:
            - v2-uv-{{ checksum "pyproject.toml" }}
      - setup-uv
      - run:
          name: Sync environment (uv)
          command: uv sync --python 3.11 << parameters.extra >>
      - save_cache:
          key: v2-uv-{{ checksum "pyproject.toml" }}
          paths:
            - ~/.cache/uv

jobs:
  build:
    executor: uv-python
    resource_class: medium
    steps:
      - checkout
      - sync-env

  pip-check:
    executor: uv-python
    steps:
      - checkout
      - sync-env
      - run:
          name: Dependency check
          command: uv pip check

  test:
    executor: uv-python
    resource_class: large
    steps:
      - checkout
      - sync-env:
          extra: "--extra test"
      - run:
          name: Unit tests with Pytest
          command: uv run pytest tests

  lint:
    executor: uv-python
    steps:
      - checkout
      - sync-env:
          extra: "--extra lint"
      - run:
          name: Linting with flake8
          command: uv run flake8 ampligraph --max-line-length 200 --ignore=W605,W503,E231

  docs:
    executor: uv-python
    steps:
      - checkout
      - sync-env:
          extra: "--extra docs"
      - run:
          name: Making docs with Sphinx
          command: |
            cd docs
            uv run make clean autogen html

workflows:
  checks:
    jobs:
      - build:
          filters: &main-develop
            branches:
              only:
                - main
                - develop
      - pip-check:
          filters: *main-develop
      - lint:
          filters: *main-develop
      - docs:
          filters: *main-develop
      - test:
          filters: *main-develop