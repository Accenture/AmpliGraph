# Manual-only pipeline — equivalent to the old CircleCI "checks" workflow.
# Does NOT run on push or PR; launch via "Run pipeline" in Azure DevOps.
trigger: none
pr: none

pool:
  vmImage: ubuntu-latest      # swap for a self-hosted pool if hosted parallelism is unavailable

variables:
  PYTHON_VERSION: '3.11'
  CACHE_KEY: 'v1 | "$(Agent.OS)" | pyproject.toml'

jobs:
  - job: build
    displayName: Build (install package)
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: $(PYTHON_VERSION)
      - task: Cache@2
        inputs:
          key: $(CACHE_KEY)
          path: venv
      - script: python3 -m venv venv
        displayName: Create virtualenv
      - script: |
          . venv/bin/activate
          venv/bin/python3 -m pip install .
        displayName: Install package

  - job: pip_check
    displayName: Pip check
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: $(PYTHON_VERSION)
      - task: Cache@2
        inputs:
          key: $(CACHE_KEY)
          path: venv
      - script: python3 -m venv venv
        displayName: Create virtualenv
      - script: |
          . venv/bin/activate
          venv/bin/python3 -m pip install .
        displayName: Install package
      - script: |
          . venv/bin/activate
          venv/bin/python3 -m pip check
        displayName: Pip check

  - job: test
    displayName: Unit tests with Pytest
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: $(PYTHON_VERSION)
      - task: Cache@2
        inputs:
          key: $(CACHE_KEY)
          path: venv
      - script: python3 -m venv venv
        displayName: Create virtualenv
      - script: |
          . venv/bin/activate
          venv/bin/python3 -m pip install .
        displayName: Install package
      - script: |
          . venv/bin/activate
          venv/bin/python3 -m pip install ".[test]"
          venv/bin/python3 -m pytest tests
        displayName: Unit tests with Pytest

  - job: lint
    displayName: Linting with flake8
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: $(PYTHON_VERSION)
      - task: Cache@2
        inputs:
          key: $(CACHE_KEY)
          path: venv
      - script: python3 -m venv venv
        displayName: Create virtualenv
      - script: |
          . venv/bin/activate
          venv/bin/python3 -m pip install flake8
          venv/bin/python3 -m flake8 ampligraph --max-line-length 200 --ignore=W605,W503,E231
        displayName: Linting with flake8

  - job: docs
    displayName: Making docs with Sphinx
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: $(PYTHON_VERSION)
      - task: Cache@2
        inputs:
          key: $(CACHE_KEY)
          path: venv
      - script: python3 -m venv venv
        displayName: Create virtualenv
      - script: |
          . venv/bin/activate
          venv/bin/python3 -m pip install .
        displayName: Install package
      - script: |
          . venv/bin/activate
          venv/bin/python3 -m pip install ".[docs]"
          cd docs
          make clean autogen html
        displayName: Making docs with Sphinx